<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
  }
  .game-container {
    background: #16213e;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    color: #e0e0e0;
  }
  .score { font-size: 24px; font-weight: bold; color: #00d2ff; }
  .high-score { font-size: 16px; color: #ffd700; }
  canvas {
    display: block;
    background: #0f3460;
    border-radius: 8px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
  }
  .controls {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
  }
  .controls button {
    background: #e94560;
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .controls button:hover { background: #c73652; }
  .controls button.restart { background: #533483; }
  .controls button.restart:hover { background: #6b4fa0; }
  .hint {
    color: #888;
    text-align: center;
    margin-top: 12px;
    font-size: 14px;
  }
  .game-over {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 32px 48px;
    border-radius: 16px;
    text-align: center;
    display: none;
  }
  .game-over h2 { font-size: 32px; margin-bottom: 8px; }
  .game-over p { font-size: 18px; margin-bottom: 16px; color: #ffd700; }
  .game-over button {
    background: #00d2ff;
    color: #1a1a2e;
    border: none;
    padding: 10px 32px;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
  }
  .game-over button:hover { background: #00b8e6; }
  .wrapper { position: relative; display: inline-block; }
</style>
</head>
<body>

<div class="game-container">
  <div class="header">
    <div class="score">🐍 <span id="score">0</span></div>
    <div class="high-score">🏆 最高: <span id="highScore">0</span></div>
  </div>

  <div class="wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="game-over" id="gameOver">
      <h2>💀 游戏结束</h2>
      <p>得分: <span id="finalScore">0</span></p>
      <button onclick="restartGame()">🔄 再来一局</button>
    </div>
  </div>

  <div class="controls">
    <button class="restart" onclick="restartGame()">🔄 重新开始</button>
  </div>
  <div class="hint">⬆⬇⬅➡ 方向键控制 | 空格键 暂停/继续</div>
</div>

<script>
// ========== 配置 ==========
const GRID_SIZE = 20;       // 20x20 网格
const CELL_SIZE = 20;       // 每格 20px
const TICK_INTERVAL = 150;  // 毫秒

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const finalScoreEl = document.getElementById('finalScore');
const gameOverEl = document.getElementById('gameOver');

// ========== 游戏状态 ==========
let snake = [];            // 蛇身坐标 [{x, y}, ...]
let food = { x: 0, y: 0 };
let direction = 'RIGHT';   // 当前移动方向
let nextDirection = 'RIGHT';
let score = 0;
let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
let gameRunning = false;
let gamePaused = false;
let gameLoop = null;

highScoreEl.textContent = highScore;

// ========== 工具函数 ==========
function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// 生成食物（避开蛇身）
function spawnFood() {
  const snakeSet = new Set(snake.map(s => `${s.x},${s.y}`));
  const freeCells = [];
  for (let x = 0; x < GRID_SIZE; x++) {
    for (let y = 0; y < GRID_SIZE; y++) {
      if (!snakeSet.has(`${x},${y}`)) freeCells.push({ x, y });
    }
  }
  if (freeCells.length === 0) return null; // 蛇占满格子 → 胜利
  return freeCells[randomInt(0, freeCells.length - 1)];
}

// ========== 初始化 ==========
function initGame() {
  // 蛇初始在中间，长度 3
  const mid = Math.floor(GRID_SIZE / 2);
  snake = [
    { x: mid, y: mid },
    { x: mid - 1, y: mid },
    { x: mid - 2, y: mid },
  ];
  direction = 'RIGHT';
  nextDirection = 'RIGHT';
  score = 0;
  scoreEl.textContent = '0';
  gameOverEl.style.display = 'none';
  const newFood = spawnFood();
  if (newFood) food = newFood;
}

// ========== 绘制 ==========
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 绘制网格线（淡）
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID_SIZE; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL_SIZE, 0);
    ctx.lineTo(i * CELL_SIZE, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * CELL_SIZE);
    ctx.lineTo(canvas.width, i * CELL_SIZE);
    ctx.stroke();
  }

  // 绘制蛇
  snake.forEach((seg, i) => {
    const x = seg.x * CELL_SIZE, y = seg.y * CELL_SIZE;
    const padding = 1;
    if (i === 0) {
      // 蛇头
      ctx.fillStyle = '#00d2ff';
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#00d2ff';
    } else {
      // 蛇身：渐变
      const ratio = 1 - (i / snake.length) * 0.5;
      ctx.fillStyle = `rgb(0, ${Math.floor(210 * ratio)}, ${Math.floor(255 * ratio)})`;
      ctx.shadowBlur = 0;
    }
    ctx.fillRect(x + padding, y + padding, CELL_SIZE - padding * 2, CELL_SIZE - padding * 2);
    // 蛇头眼睛
    if (i === 0) {
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 0;
      const eyeSize = 3;
      if (direction === 'RIGHT') {
        ctx.fillRect(x + 12, y + 4, eyeSize, eyeSize);
        ctx.fillRect(x + 12, y + 13, eyeSize, eyeSize);
      } else if (direction === 'LEFT') {
        ctx.fillRect(x + 5, y + 4, eyeSize, eyeSize);
        ctx.fillRect(x + 5, y + 13, eyeSize, eyeSize);
      } else if (direction === 'UP') {
        ctx.fillRect(x + 4, y + 5, eyeSize, eyeSize);
        ctx.fillRect(x + 13, y + 5, eyeSize, eyeSize);
      } else if (direction === 'DOWN') {
        ctx.fillRect(x + 4, y + 12, eyeSize, eyeSize);
        ctx.fillRect(x + 13, y + 12, eyeSize, eyeSize);
      }
    }
  });

  // 绘制食物（闪烁红苹果）
  const fx = food.x * CELL_SIZE, fy = food.y * CELL_SIZE;
  const pulse = Math.sin(Date.now() / 200) * 0.15 + 0.85;
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#ff4757';
  ctx.fillStyle = `rgba(255, 71, 87, ${pulse})`;
  ctx.beginPath();
  ctx.arc(fx + CELL_SIZE / 2, fy + CELL_SIZE / 2, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 暂停提示
  if (gamePaused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 暂停', canvas.width / 2, canvas.height / 2);
  }
}

// ========== 游戏逻辑更新 ==========
function update() {
  if (gamePaused) return;

  direction = nextDirection;

  // 计算新蛇头位置
  const head = snake[0];
  let newHead = { ...head };
  switch (direction) {
    case 'RIGHT': newHead.x++; break;
    case 'LEFT':  newHead.x--; break;
    case 'UP':    newHead.y--; break;
    case 'DOWN':  newHead.y++; break;
  }

  // 撞墙检测
  if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
    gameOver();
    return;
  }

  // 撞自身检测（注意：如果吃到食物，尾部不删，所以撞到尾部最后一个格子不算撞）
  const willEat = newHead.x === food.x && newHead.y === food.y;
  const bodyToCheck = willEat ? snake : snake.slice(0, -1);
  if (bodyToCheck.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
    gameOver();
    return;
  }

  // 移动蛇
  snake.unshift(newHead);
  if (willEat) {
    score++;
    scoreEl.textContent = score;
    const newFood = spawnFood();
    if (newFood === null) {
      // 胜利！
      gameOver(true);
      return;
    }
    food = newFood;
  } else {
    snake.pop();
  }
}

// ========== 游戏结束 ==========
function gameOver(win = false) {
  gameRunning = false;
  clearInterval(gameLoop);
  gameLoop = null;
  finalScoreEl.textContent = score;
  if (score > highScore) {
    highScore = score;
    highScoreEl.textContent = highScore;
    localStorage.setItem('snakeHighScore', String(highScore));
  }
  gameOverEl.querySelector('h2').textContent = win ? '🎉 你赢了！' : '💀 游戏结束';
  gameOverEl.style.display = 'block';
}

// ========== 重新开始 ==========
function restartGame() {
  if (gameLoop) clearInterval(gameLoop);
  initGame();
  gameRunning = true;
  gamePaused = false;
  gameLoop = setInterval(() => { update(); draw(); }, TICK_INTERVAL);
}

// ========== 键盘控制 ==========
document.addEventListener('keydown', (e) => {
  const key = e.key;
  // 防止页面滚动
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(key)) {
    e.preventDefault();
  }

  if (key === ' ') {
    if (gameRunning) gamePaused = !gamePaused;
    return;
  }

  if (!gameRunning) return;

  // 禁止 180° 掉头
  const opposites = { 'UP': 'DOWN', 'DOWN': 'UP', 'LEFT': 'RIGHT', 'RIGHT': 'LEFT' };
  const keyMap = { 'ArrowUp': 'UP', 'ArrowDown': 'DOWN', 'ArrowLeft': 'LEFT', 'ArrowRight': 'RIGHT' };
  const newDir = keyMap[key];
  if (newDir && opposites[newDir] !== direction) {
    nextDirection = newDir;
  }
});

// ========== 启动游戏 ==========
initGame();
gameRunning = true;
gameLoop = setInterval(() => { update(); draw(); }, TICK_INTERVAL);
</script>

</body>
</html>
